services:
  server:
    build:
      context: ../..
      dockerfile: deploy/docker-compose/Dockerfile.server
    container_name: adp-server
    environment:
      ADP_SERVER_ADDR: ":8080"
      ADP_ADMIN_USERNAME: "admin"
      ADP_ADMIN_PASSWORD: "admin123"
      ADP_AUTH_SECRET: "adp-dev-secret"
      ADP_WORKER_SHARED_TOKEN: "adp-worker-secret"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

  worker:
    build:
      context: ../..
      dockerfile: deploy/docker-compose/Dockerfile.worker
    container_name: adp-worker
    depends_on:
      server:
        condition: service_healthy
    environment:
      ADP_SERVER_URL: "http://server:8080"
      ADP_WORKER_SHARED_TOKEN: "adp-worker-secret"
      ADP_WORKER_NAME: "worker-compose-1"
      ADP_WORKER_TYPE: "shell"
      ADP_WORKER_POLL_INTERVAL: "3s"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: adp-prometheus
    depends_on:
      server:
        condition: service_healthy
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
