apiVersion: v1
kind: ConfigMap
metadata:
  name: adp-ai-context
  namespace: adp
  labels:
    app.kubernetes.io/name: adp-server
    app.kubernetes.io/part-of: adp
data:
  ai_context.yaml: |
    services:
      - name: mysql-default
        type: mysql
        host: "127.0.0.1"
        port: "3306"
        user: "root"
        password_ref: "ADP_MYSQL_PASSWORD"
        configs:
          - name: main
            path: "/etc/mysql/my.cnf"
        logs:
          - name: error
            path: "/var/log/mysql/error.log"

      - name: redis-default
        type: redis
        host: "127.0.0.1"
        port: "6379"
        configs:
          - name: main
            path: "/etc/redis/redis.conf"
        logs:
          - name: server
            path: "/var/log/redis/redis-server.log"
        extra:
          process: "redis-server"

      - name: nginx-default
        type: nginx
        host: "127.0.0.1"
        port: "80"
        configs:
          - name: main
            path: "/etc/nginx/nginx.conf"
        logs:
          - name: error
            path: "/var/log/nginx/error.log"
          - name: access
            path: "/var/log/nginx/access.log"
        extra:
          process: "nginx"
