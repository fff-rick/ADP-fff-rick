apiVersion: v1
kind: Secret
metadata:
  name: adp-server-secret
  namespace: adp
  labels:
    app.kubernetes.io/name: adp-server
    app.kubernetes.io/part-of: adp
type: Opaque
stringData:
  ADP_DB_DSN: "postgres://postgres:change-me@postgres.adp.svc.cluster.local:5432/adp?sslmode=disable"
  ADP_AUTH_ADMIN_USERNAME: "admin"
  ADP_AUTH_ADMIN_PASSWORD: "change-me"
  ADP_AUTH_SECRET: "change-me-long-random-jwt-secret"
  ADP_AUTH_WORKER_TOKEN: "change-me-long-random-worker-token"
  ADP_LLM_API_KEY: ""
