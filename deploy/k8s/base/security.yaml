apiVersion: v1
kind: ServiceAccount
metadata:
  name: adp-server
  namespace: adp
  labels:
    app.kubernetes.io/name: adp-server
    app.kubernetes.io/part-of: adp
automountServiceAccountToken: false
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: adp-default-deny-ingress
  namespace: adp
spec:
  podSelector: {}
  policyTypes: [Ingress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: adp-server-ingress
  namespace: adp
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: adp-server
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9090
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-ingress
  namespace: adp
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgres
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: adp-server
      ports:
        - protocol: TCP
          port: 5432
