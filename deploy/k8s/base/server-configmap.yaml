apiVersion: v1
kind: ConfigMap
metadata:
  name: adp-server-config
  namespace: adp
  labels:
    app.kubernetes.io/name: adp-server
    app.kubernetes.io/part-of: adp
data:
  ADP_ADDR: ":8080"
  ADP_WORKER_GRPC_ADDR: ":9090"
  ADP_LLM_BASE_URL: "https://api.deepseek.com"
  ADP_LLM_MODEL: "deepseek-v4-pro"
  ADP_AI_CONTEXT: "/etc/adp/ai/ai_context.yaml"
