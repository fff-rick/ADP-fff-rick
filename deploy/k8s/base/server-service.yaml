apiVersion: v1
kind: Service
metadata:
  name: adp-server
  namespace: adp
  labels:
    app.kubernetes.io/name: adp-server
    app.kubernetes.io/part-of: adp
spec:
  # Temporary public access before a TLS Ingress/domain is available.
  type: NodePort
  selector:
    app.kubernetes.io/name: adp-server
  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 30081
    - name: grpc
      port: 9090
      targetPort: grpc
      nodePort: 30090
