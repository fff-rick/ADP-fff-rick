apiVersion: v1
kind: Service
metadata:
  name: adp-server
  namespace: adp
  labels:
    app.kubernetes.io/name: adp-server
    app.kubernetes.io/part-of: adp
spec:
  # Public exposure is provided only by a separately managed TLS Ingress.
  type: ClusterIP
  selector:
    app.kubernetes.io/name: adp-server
  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 30081
