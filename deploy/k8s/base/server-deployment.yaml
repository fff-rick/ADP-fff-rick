apiVersion: apps/v1
kind: Deployment
metadata:
  name: adp-server
  labels:
    app.kubernetes.io/name: adp-server
    app.kubernetes.io/part-of: adp
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: adp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: adp-server
        app.kubernetes.io/part-of: adp
    spec:
      containers:
        - name: adp-server
          image: adp-server:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: adp-runtime
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
