apiVersion: apps/v1
kind: Deployment
metadata:
  name: adp-server
  namespace: adp
  labels:
    app.kubernetes.io/name: adp-server
    app.kubernetes.io/part-of: adp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: adp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: adp-server
        app.kubernetes.io/part-of: adp
    spec:
      serviceAccountName: adp-server
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: adp-server
          image: ghcr.io/fff-rick/adp-server:v1.1
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
          ports:
            - name: http
              containerPort: 8080
            - name: worker-grpc
              containerPort: 9090
          envFrom:
            - configMapRef:
                name: adp-server-config
            - secretRef:
                name: adp-server-secret
          # Go's default temp directory must remain writable with a read-only root filesystem.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: ai-context
              mountPath: /etc/adp/ai
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: tmp
          emptyDir: {}
        - name: ai-context
          configMap:
            name: adp-ai-context
