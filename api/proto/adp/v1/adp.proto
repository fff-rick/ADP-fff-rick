syntax = "proto3";

package adp.v1;

option go_package = "adp/api/proto/adp/v1;adpv1";

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

service AuthService {
  rpc Login(LoginRequest) returns (LoginResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/login"
      body: "*"
    };
  }
}

service UserService {
  rpc ListUsers(google.protobuf.Empty) returns (ListUsersResponse) {
    option (google.api.http) = {get: "/api/v1/users"};
  }

  rpc CreateUser(CreateUserRequest) returns (User) {
    option (google.api.http) = {
      post: "/api/v1/users"
      body: "*"
    };
  }
}

service DashboardService {
  rpc GetSummary(google.protobuf.Empty) returns (DashboardSummary) {
    option (google.api.http) = {get: "/api/v1/dashboard/summary"};
  }
}

service JobService {
  rpc CreateJob(CreateJobRequest) returns (Job) {
    option (google.api.http) = {
      post: "/api/v1/jobs"
      body: "*"
    };
  }

  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse) {
    option (google.api.http) = {get: "/api/v1/jobs"};
  }

  rpc GetJob(GetJobRequest) returns (Job) {
    option (google.api.http) = {get: "/api/v1/jobs/{id}"};
  }
}

service WorkerService {
  rpc CreateWorker(RegisterWorkerRequest) returns (Worker) {
    option (google.api.http) = {
      post: "/api/v1/workers"
      body: "*"
    };
  }

  rpc ListWorkers(google.protobuf.Empty) returns (ListWorkersResponse) {
    option (google.api.http) = {get: "/api/v1/workers"};
  }

  rpc RegisterWorker(RegisterWorkerRequest) returns (Worker) {
    option (google.api.http) = {
      post: "/api/v1/workers/register"
      body: "*"
    };
  }

  rpc HeartbeatWorker(HeartbeatWorkerRequest) returns (Worker) {
    option (google.api.http) = {
      post: "/api/v1/workers/{worker_id}/heartbeat"
      body: "*"
    };
  }

  rpc PollWorker(PollWorkerRequest) returns (PollWorkerResponse) {
    option (google.api.http) = {
      post: "/api/v1/workers/{worker_id}/poll"
      body: "*"
    };
  }

  rpc CompleteJob(CompleteJobRequest) returns (Job) {
    option (google.api.http) = {
      post: "/api/v1/workers/{worker_id}/jobs/{job_id}/complete"
      body: "*"
    };
  }
}

service TemplateService {
  rpc ListTemplates(google.protobuf.Empty) returns (ListTemplatesResponse) {
    option (google.api.http) = {get: "/api/v1/templates"};
  }
}

service TaskService {
  rpc ListTaskJobs(google.protobuf.Empty) returns (ListJobsResponse) {
    option (google.api.http) = {get: "/api/v1/tasks"};
  }

  rpc ParseTask(ParseTaskRequest) returns (TaskIntent) {
    option (google.api.http) = {
      post: "/api/v1/tasks/parse"
      body: "*"
    };
  }

  rpc RunTask(RunTaskRequest) returns (RunTaskResponse) {
    option (google.api.http) = {
      post: "/api/v1/tasks/run"
      body: "*"
    };
  }
}

service ApprovalService {
  rpc ListPendingApprovalJobs(google.protobuf.Empty) returns (ListJobsResponse) {
    option (google.api.http) = {get: "/api/v1/approvals/jobs"};
  }

  rpc ApproveJob(ApproveJobRequest) returns (Job) {
    option (google.api.http) = {
      post: "/api/v1/approvals/jobs/{job_id}"
      body: "*"
    };
  }
}

service AuditService {
  rpc ListAuditLogs(ListAuditLogsRequest) returns (ListAuditLogsResponse) {
    option (google.api.http) = {get: "/api/v1/audit/logs"};
  }
}

service IncidentCaseService {
  rpc ListIncidentCases(ListIncidentCasesRequest) returns (ListIncidentCasesResponse) {
    option (google.api.http) = {get: "/api/v1/cases"};
  }

  rpc SuggestIncidentCases(SuggestIncidentCasesRequest) returns (SuggestIncidentCasesResponse) {
    option (google.api.http) = {get: "/api/v1/cases/suggestions"};
  }
}

service DiagnosisService {
  rpc CreateDiagnosisPlan(CreateDiagnosisPlanRequest) returns (DiagnosisPlan) {
    option (google.api.http) = {
      post: "/api/v1/diagnosis/plan"
      body: "*"
    };
  }

  rpc GetDiagnosisPlan(GetDiagnosisPlanRequest) returns (DiagnosisPlan) {
    option (google.api.http) = {get: "/api/v1/diagnosis/plan/{plan_id}"};
  }

  rpc ExecuteDiagnosisPlan(ExecuteDiagnosisPlanRequest) returns (ExecuteDiagnosisPlanResponse) {
    option (google.api.http) = {
      post: "/api/v1/diagnosis/plan/{plan_id}/execute"
      body: "*"
    };
  }

  rpc AnalyzeDiagnosisPlan(AnalyzeDiagnosisPlanRequest) returns (AnalysisReport) {
    option (google.api.http) = {
      post: "/api/v1/diagnosis/plan/{plan_id}/analyze"
      body: "*"
    };
  }
}

service HealthService {
  rpc Check(google.protobuf.Empty) returns (HealthCheckResponse) {
    option (google.api.http) = {get: "/healthz"};
  }
}

enum WorkerStatus {
  WORKER_STATUS_UNSPECIFIED = 0;
  WORKER_STATUS_ONLINE = 1;
  WORKER_STATUS_OFFLINE = 2;
}

enum JobStatus {
  JOB_STATUS_UNSPECIFIED = 0;
  JOB_STATUS_PENDING = 1;
  JOB_STATUS_WAITING_APPROVAL = 2;
  JOB_STATUS_QUEUED = 3;
  JOB_STATUS_RUNNING = 4;
  JOB_STATUS_SUCCESS = 5;
  JOB_STATUS_FAILED = 6;
  JOB_STATUS_CANCELLED = 7;
}

enum ApprovalStatus {
  APPROVAL_STATUS_UNSPECIFIED = 0;
  APPROVAL_STATUS_NOT_REQUIRED = 1;
  APPROVAL_STATUS_PENDING = 2;
  APPROVAL_STATUS_APPROVED = 3;
  APPROVAL_STATUS_REJECTED = 4;
}

enum RiskLevel {
  RISK_LEVEL_UNSPECIFIED = 0;
  RISK_LEVEL_LOW = 1;
  RISK_LEVEL_MEDIUM = 2;
  RISK_LEVEL_HIGH = 3;
}

enum PlanStatus {
  PLAN_STATUS_UNSPECIFIED = 0;
  PLAN_STATUS_PENDING = 1;
  PLAN_STATUS_WAITING_APPROVAL = 2;
  PLAN_STATUS_RUNNING = 3;
  PLAN_STATUS_COMPLETED = 4;
  PLAN_STATUS_FAILED = 5;
}

message User {
  string username = 1;
  string role = 2;
}

message Worker {
  string id = 1;
  string name = 2;
  string worker_type = 3;
  WorkerStatus status = 4;
  google.protobuf.Timestamp last_heartbeat_at = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message Job {
  string id = 1;
  string name = 2;
  string worker_type = 3;
  string command = 4;
  JobStatus status = 5;
  RiskLevel risk_level = 6;
  bool approval_required = 7;
  ApprovalStatus approval_status = 8;
  string approval_comment = 9;
  string approved_by = 10;
  google.protobuf.Timestamp approved_at = 11;
  string rejected_by = 12;
  google.protobuf.Timestamp rejected_at = 13;
  string template_code = 14;
  string source_type = 15;
  string source_id = 16;
  string assigned_worker_id = 17;
  string output = 18;
  google.protobuf.Timestamp created_at = 19;
  google.protobuf.Timestamp updated_at = 20;
  google.protobuf.Timestamp started_at = 21;
  google.protobuf.Timestamp finished_at = 22;
}

message TaskIntent {
  string intent = 1;
  string target_type = 2;
  string schedule = 3;
  RiskLevel risk_level = 4;
  map<string, string> parameters = 5;
  string matched_template = 6;
}

message CommandTemplate {
  string code = 1;
  string name = 2;
  string description = 3;
  string tool_type = 4;
  string command = 5;
  repeated TemplateParam parameters = 6;
  RiskLevel risk_level = 7;
}

message TemplateParam {
  string name = 1;
  string description = 2;
  bool required = 3;
  string default = 4;
}

message DiagnosisPlan {
  string id = 1;
  string title = 2;
  string description = 3;
  string trigger_type = 4;
  repeated DiagnosisStep steps = 5;
  PlanStatus status = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message DiagnosisStep {
  int32 step_no = 1;
  string name = 2;
  string description = 3;
  string template_code = 4;
  map<string, string> parameters = 5;
  int32 timeout_seconds = 6;
  JobStatus status = 7;
  string job_id = 8;
  StepResult result = 9;
}

message StepResult {
  string stdout = 1;
  string stderr = 2;
  int32 exit_code = 3;
  bool success = 4;
  string summary = 5;
}

message AnalysisReport {
  string plan_id = 1;
  string fault_type = 2;
  repeated string possible_causes = 3;
  repeated string suggestions = 4;
  double confidence = 5;
  string raw_analysis = 6;
  repeated IncidentCase reference_cases = 7;
  repeated string historical_hints = 8;
  google.protobuf.Timestamp created_at = 9;
}

message AuditLog {
  string id = 1;
  string actor_type = 2;
  string actor_id = 3;
  string action = 4;
  string resource_type = 5;
  string resource_id = 6;
  google.protobuf.Struct details = 7;
  google.protobuf.Timestamp created_at = 8;
}

message IncidentCase {
  string id = 1;
  string title = 2;
  string trigger_type = 3;
  string fault_type = 4;
  string summary = 5;
  repeated string possible_causes = 6;
  repeated string suggestions = 7;
  double confidence = 8;
  string source_plan_id = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message MetricsSnapshot {
  int32 jobs_total = 1;
  int32 jobs_success = 2;
  int32 jobs_failed = 3;
  int32 jobs_waiting_approval = 4;
  int32 workers_online = 5;
  int32 incident_cases_total = 6;
  double job_success_rate = 7;
  double job_failure_rate = 8;
  double avg_schedule_latency_seconds = 9;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  string token = 1;
  User user = 2;
}

message ListUsersResponse {
  repeated User users = 1;
}

message CreateUserRequest {
  string username = 1;
  string password = 2;
  string role = 3;
}

message DashboardSummary {
  User user = 1;
  string current_time = 2;
  MetricsSnapshot metrics = 3;
  repeated Job recent_jobs = 4;
  repeated Worker workers = 5;
  repeated Job pending_approvals = 6;
  repeated IncidentCase recent_cases = 7;
  repeated AuditLog recent_audit_logs = 8;
  int32 templates_total = 9;
}

message CreateJobRequest {
  string name = 1;
  string worker_type = 2;
  string command = 3;
}

message ListJobsRequest {
  string source_type = 1;
  string worker_type = 2;
  JobStatus status = 3;
  int32 limit = 4;
}

message ListJobsResponse {
  repeated Job jobs = 1;
}

message GetJobRequest {
  string id = 1;
}

message RegisterWorkerRequest {
  string name = 1;
  string worker_type = 2;
}

message ListWorkersResponse {
  repeated Worker workers = 1;
}

message HeartbeatWorkerRequest {
  string worker_id = 1;
}

message PollWorkerRequest {
  string worker_id = 1;
}

message PollWorkerResponse {
  Job job = 1;
}

message CompleteJobRequest {
  string worker_id = 1;
  string job_id = 2;
  bool success = 3;
  string output = 4;
}

message ListTemplatesResponse {
  repeated CommandTemplate templates = 1;
}

message ParseTaskRequest {
  string input = 1;
}

message RunTaskRequest {
  string input = 1;
  map<string, string> parameters = 2;
}

message RunTaskResponse {
  Job job = 1;
  bool approval_required = 2;
  TaskIntent parsed_intent = 3;
  string template_code = 4;
  string rendered_command = 5;
}

message ApproveJobRequest {
  string job_id = 1;
  bool approved = 2;
  string comment = 3;
}

message ListAuditLogsRequest {
  string resource_type = 1;
  string resource_id = 2;
}

message ListAuditLogsResponse {
  repeated AuditLog logs = 1;
}

message ListIncidentCasesRequest {
  string q = 1;
  string trigger_type = 2;
  string fault_type = 3;
  int32 limit = 4;
}

message ListIncidentCasesResponse {
  repeated IncidentCase cases = 1;
}

message SuggestIncidentCasesRequest {
  string description = 1;
  string trigger_type = 2;
  string fault_type = 3;
  int32 limit = 4;
}

message SuggestIncidentCasesResponse {
  repeated IncidentCase reference_cases = 1;
  repeated string historical_hints = 2;
}

message CreateDiagnosisPlanRequest {
  string description = 1;
}

message GetDiagnosisPlanRequest {
  string plan_id = 1;
}

message ExecuteDiagnosisPlanRequest {
  string plan_id = 1;
}

message ExecuteDiagnosisPlanResponse {
  string plan_id = 1;
  PlanStatus status = 2;
  bool approval_required = 3;
  repeated DiagnosisStepJob jobs = 4;
}

message DiagnosisStepJob {
  int32 step_no = 1;
  string job_id = 2;
  JobStatus status = 3;
  RiskLevel risk_level = 4;
  bool needs_review = 5;
}

message AnalyzeDiagnosisPlanRequest {
  string plan_id = 1;
}

message HealthCheckResponse {
  string status = 1;
}
