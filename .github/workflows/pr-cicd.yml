name: CI/CD

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches:
      - main

concurrency:
  group: ci-cd-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  lint:
    name: Lint
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
          verify: true
          args: --config=.golangci.yml

  test:
    name: Test
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - run: go test ./...

  build-push:
    name: Build & Push
    needs:
      - lint
      - test
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Go binaries
        run: |
          mkdir -p output
          CGO_ENABLED=0 go build -trimpath -o output/adp-server ./cmd/server

      - name: Resolve image tag
        id: image
        run: |
          set -eu
          tag="$(awk '
            $1 == "-" && $2 == "name:" && $3 == "adp-server" { found = 1; next }
            found && $1 == "newTag:" { print $2; exit }
          ' deploy/k8s/overlays/prod/kustomization.yaml)"

          if [ -z "$tag" ]; then
            echo "failed to resolve adp-server newTag from deploy/k8s/overlays/prod/kustomization.yaml" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Using adp-server image tag: $tag"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/adp-server:latest
            ghcr.io/${{ github.repository_owner }}/adp-server:${{ steps.image.outputs.tag }}

      - name: Install Argo CD CLI
        run: |
          set -eu
          curl -sSL -o argocd-linux-amd64 https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          sudo install -m 0755 argocd-linux-amd64 /usr/local/bin/argocd
          argocd version --client

      - name: Sync Argo CD application
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          set -eu
          argocd app sync adp \
            --server "$ARGOCD_SERVER" \
            --auth-token "$ARGOCD_AUTH_TOKEN" \
            --grpc-web \
            --insecure \
            --prune

          argocd app wait adp \
            --server "$ARGOCD_SERVER" \
            --auth-token "$ARGOCD_AUTH_TOKEN" \
            --grpc-web \
            --insecure \
            --sync \
            --health \
            --timeout 300
