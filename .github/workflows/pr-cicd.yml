name: CI/CD

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches:
      - main

concurrency:
  group: ci-cd-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  lint:
    name: Lint
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
          verify: true
          args: --config=.golangci.yml

  test:
    name: Test
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - run: go test ./...

  build-push:
    name: Build & Push
    needs:
      - lint
      - test
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Go binaries
        run: |
          mkdir -p output
          CGO_ENABLED=0 go build -trimpath -o output/adp-server ./cmd/server

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/adp-server:latest
            ghcr.io/${{ github.repository_owner }}/adp-server:${{ github.sha }}

      - name: Sync manifests via ArgoCD
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.ADP_DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.ADP_DEPLOY_SSH_KEY }}
          DEPLOY_PORT: ${{ secrets.ADP_DEPLOY_PORT }}
        run: |
          set -eu
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/adp_deploy_key
          chmod 600 ~/.ssh/adp_deploy_key
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          ssh -i ~/.ssh/adp_deploy_key -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "kubectl set image -n adp deployment/adp-server adp-server=ghcr.io/${{ github.repository_owner }}/adp-server:${{ github.sha }} && \
             kubectl rollout status -n adp deployment/adp-server --timeout=120s"
