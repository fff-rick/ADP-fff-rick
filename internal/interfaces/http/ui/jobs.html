<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ADP Jobs</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body data-page="jobs">

  <div class="ambient-glow"></div>

  <div class="shell" style="position: relative; z-index: 1;">
    <header class="topbar">
      <div class="topbar-brand">
        Jobs<em>Job Management</em>
      </div>

      <div class="topbar-right">
        <span class="server-clock" id="clock">--:--:--</span>
        <a href="/login" class="btn btn-xs btn-primary" id="login-nav-btn" style="display:none;">登录</a>
        <span class="session-badge" id="session-state">未登录</span>
        <button id="logout-button" class="btn btn-xs btn-ghost" style="display:none;">退出</button>
        <button class="theme-toggle" id="theme-toggle" type="button" title="切换主题">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
      </div>
    </header>

    <nav class="nav" style="margin-bottom: 28px;">
      <a class="nav-link" href="/">首页</a>
            <a class="nav-link" href="/users">用户</a>
      <a class="nav-link" href="/workers">Workers</a>
      <a class="nav-link is-active" href="/jobs">Jobs</a>
      <a class="nav-link" href="/tasks">Tasks</a>
    </nav>

    <main>
      <div class="page-grid scroll-reveal stagger-1">
        <div class="panel-shell" style="grid-row: span 2;">
          <div class="panel-core">
            <div class="panel-heading">
              <span class="panel-index">创建</span>
              <span class="panel-title">Job</span>
            </div>

            <form id="job-form" class="form-stack">
              <div class="field-group">
                <label class="field-label" for="job-name">名称</label>
                <input class="field-input" id="job-name" name="job-name" type="text" placeholder="例如：check-nginx-health">
              </div>
              <div class="two-up">
                <div class="field-group">
                  <label class="field-label" for="job-worker-type">Worker 类型</label>
                  <input class="field-input" id="job-worker-type" name="job-worker-type" type="text" value="shell">
                </div>
                <div class="field-group">
                  <label class="field-label" for="job-command">命令</label>
                  <input class="field-input" id="job-command" name="job-command" type="text" placeholder="例如：curl -I http://127.0.0.1">
                </div>
              </div>

              <div class="field-group" id="worker-select-group">
                <label class="field-label" for="job-worker-ids">目标 Worker（多选）</label>
                <select class="field-select" id="job-worker-ids" name="job-worker-ids" multiple style="min-height: 100px;">
                </select>
                <span style="font-size: 0.6875rem; color: var(--text-tertiary);">Ctrl+Click 多选；创建后由 Server 立即推送到选中的 Worker</span>
              </div>

              <button class="btn btn-primary" type="submit">创建并调度 Job</button>
            </form>

            <!-- YAML 批量任务 -->
            <div style="margin-top: 24px;">
              <div class="panel-heading" style="margin-bottom: 12px;">
                <span class="panel-index">YAML</span>
                <span class="panel-title">批量调度</span>
              </div>
              <form id="yaml-job-form" class="form-stack">
                <div class="field-group">
                  <textarea class="field-textarea" id="yaml-input" rows="10" placeholder="name: nginx-巡检
tasks:
  - name: 检查进程
    template: check_process
    parameters:
      Process: nginx
  - name: 检查端口
    template: check_port
    parameters:
      Port: "80"
worker_type: shell
workers:
  - all"></textarea>
                </div>
                <button class="btn btn-secondary" type="submit">从 YAML 批量创建</button>
              </form>
            </div>
          </div>
        </div>

        <div class="panel-shell">
          <div class="panel-core">
            <div class="panel-heading">
              <span class="panel-index">审批</span>
              <span class="panel-title">待审批</span>
            </div>
            <div id="approval-list"></div>
          </div>
        </div>

        <div class="panel-shell">
          <div class="panel-core">
            <div class="panel-heading">
              <span class="panel-index">列表</span>
              <span class="panel-title">Job</span>
            </div>
            <div id="job-list"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="toast" class="toast" hidden></div>
  <script src="/static/app.js" defer></script>
</body>
</html>
