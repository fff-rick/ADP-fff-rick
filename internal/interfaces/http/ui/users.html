<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ADP Users</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body data-page="users">

  <div class="ambient-glow"></div>

  <div class="shell" style="position: relative; z-index: 1;">
    <header class="topbar">
      <div class="topbar-brand">
        用户<em>User Management</em>
      </div>

      <div class="topbar-right">
        <span class="server-clock" id="clock">--:--:--</span>
        <span class="session-badge" id="session-state">未登录</span>
        <button class="theme-toggle" id="theme-toggle" type="button" title="切换主题">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
      </div>
    </header>

    <nav class="nav" style="margin-bottom: 28px;">
      <a class="nav-link" href="/">首页</a>
      <a class="nav-link" href="/login">登录</a>
      <a class="nav-link is-active" href="/users">用户</a>
      <a class="nav-link" href="/workers">Workers</a>
      <a class="nav-link" href="/jobs">Jobs</a>
      <a class="nav-link" href="/tasks">Tasks</a>
    </nav>

    <main>
      <div class="page-grid scroll-reveal stagger-1">
        <div class="panel-shell">
          <div class="panel-core">
            <div class="panel-heading">
              <span class="panel-index">创建</span>
              <span class="panel-title">用户</span>
            </div>

            <p id="users-access-note" style="font-size: 0.8125rem; color: var(--text-secondary); margin-bottom: 16px;">请先以管理员身份登录。</p>

            <form id="user-form" class="form-stack">
              <div class="field-group">
                <label class="field-label" for="new-username">用户名</label>
                <input class="field-input" id="new-username" name="new-username" type="text" placeholder="例如：ops-user">
              </div>
              <div class="two-up">
                <div class="field-group">
                  <label class="field-label" for="new-password">密码</label>
                  <input class="field-input" id="new-password" name="new-password" type="password" placeholder="初始密码">
                </div>
                <div class="field-group">
                  <label class="field-label" for="new-role">角色</label>
                  <select class="field-select" id="new-role" name="new-role">
                    <option value="operator">operator</option>
                    <option value="admin">admin</option>
                  </select>
                </div>
              </div>
              <button class="btn btn-primary" type="submit">创建用户</button>
            </form>
          </div>
        </div>

        <div class="panel-shell">
          <div class="panel-core">
            <div class="panel-heading">
              <span class="panel-index">列表</span>
              <span class="panel-title">用户</span>
            </div>
            <div id="user-list"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="toast" class="toast" hidden></div>
  <script src="/static/app.js" defer></script>
</body>
</html>
