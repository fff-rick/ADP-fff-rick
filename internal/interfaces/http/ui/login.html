<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ADP Login</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body data-page="login">

  <div class="login-page">
    <div class="login-card-outer" style="width: 400px; max-width: 90vw;">
      <div class="login-card">
        <div class="panel-heading" style="border-bottom: none; padding-bottom: 0; margin-bottom: 24px;">
          <div>
            <h2 style="margin-bottom: 4px;">ADP</h2>
            <p style="margin: 0; font-size: 0.8125rem; color: var(--text-secondary);">AI Dispatch Platform</p>
          </div>
        </div>

        <form id="login-form" class="form-stack">
          <div class="field-group">
            <label class="field-label" for="username">用户名</label>
            <input class="field-input" id="username" name="username" type="text" value="admin" autocomplete="username">
          </div>
          <div class="field-group">
            <label class="field-label" for="password">密码</label>
            <input class="field-input" id="password" name="password" type="password" autocomplete="current-password">
          </div>
          <div style="display: flex; gap: 10px; align-items: center;">
            <button class="btn btn-primary" type="submit">登录</button>
            <button id="logout-button" class="btn btn-ghost" type="button">退出登录</button>
          </div>
        </form>

        <p id="login-message" style="font-size: 0.75rem; color: var(--text-tertiary); margin: 16px 0 0 0;">登录后即可进入用户、Workers、Jobs、Tasks 页面进行操作。</p>

        <div style="margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
          <span class="server-clock" id="clock">--:--:--</span>
          <a class="btn btn-inline" href="/">返回首页</a>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>
  <script src="/static/app.js" defer></script>
</body>
</html>
