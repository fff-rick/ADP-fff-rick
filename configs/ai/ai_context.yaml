# AI Context — 注入到 LLM prompt 中的环境配置
# 启动时通过 server 配置 ai_context 或 --ai-context 参数加载
#
# 所有服务统一使用 ServiceProfile 结构；不需要的字段可以留空或省略。
# 不建议在这里写明文密码，使用 password_ref 引用环境变量或密钥名。

services:
  - name: mysql-default
    type: mysql
    host: "127.0.0.1"
    port: "3306"
    user: "root"
    password_ref: "ADP_MYSQL_PASSWORD"
    configs:
      - name: main
        path: "/etc/mysql/my.cnf"
    logs:
      - name: error
        path: "/var/log/mysql/error.log"

  - name: redis-default
    type: redis
    host: "127.0.0.1"
    port: "6379"
    configs:
      - name: main
        path: "/etc/redis/redis.conf"
    logs:
      - name: server
        path: "/var/log/redis/redis-server.log"
    extra:
      process: "redis-server"

  - name: nginx-default
    type: nginx
    host: "127.0.0.1"
    port: "80"
    configs:
      - name: main
        path: "/etc/nginx/nginx.conf"
    logs:
      - name: error
        path: "/var/log/nginx/error.log"
      - name: access
        path: "/var/log/nginx/access.log"
    extra:
      process: "nginx"
