version: '3'

vars:
  OUTPUT_DIR: output
  TW_VERSION: 4.3.2

tasks:
  css:setup:
    desc: Download Tailwind CSS standalone binary
    cmds:
      - mkdir -p bin
      - test -f bin/tailwindcss && bin/tailwindcss --version 2>/dev/null || curl -sL "https://github.com/tailwindlabs/tailwindcss/releases/download/v{{.TW_VERSION}}/tailwindcss-linux-x64" -o bin/tailwindcss
      - chmod +x bin/tailwindcss
      - bin/tailwindcss --version

  css:
    desc: Build Tailwind CSS
    deps: [css:setup]
    cmds:
      - bin/tailwindcss -i internal/interfaces/http/ui/src/app.css -o internal/interfaces/http/ui/app.css

  build:
    desc: Build all binaries
    deps: [css]
    cmds:
      - mkdir -p {{.OUTPUT_DIR}}
      - CGO_ENABLED=0 go build -trimpath -o {{.OUTPUT_DIR}}/adp-server ./cmd/server
      - CGO_ENABLED=0 go build -trimpath -o {{.OUTPUT_DIR}}/adp-worker ./cmd/worker

  clean:
    desc: Clean build output
    cmds:
      - rm -rf {{.OUTPUT_DIR}}
